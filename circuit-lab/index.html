<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Circuit Lab — build, learn, code</title>
<meta name="description" content="Realistic circuit building sandbox with real Arduino-C coding for ESP32 & Arduino, lessons and levels. Works offline.">
<meta name="theme-color" content="#0d1017">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{
  --bg:#0d1017; --bg2:#141926; --bg3:#1c2333; --line:#2a3247;
  --fg:#e6ecf7; --fg2:#93a1ba; --acc:#4da3ff; --ok:#3ecf72; --warn:#f4b53f; --bad:#ff5c5c;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; margin:0; overflow:hidden; background:var(--bg); color:var(--fg);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; overscroll-behavior:none; }
button{ font:inherit; color:inherit; }

/* ---------- header ---------- */
header{ display:flex; align-items:center; gap:6px; padding:8px 10px; padding-top:calc(8px + env(safe-area-inset-top,0px));
  background:var(--bg2); border-bottom:1px solid var(--line); position:relative; z-index:30; }
.logo{ font-weight:800; font-size:15px; letter-spacing:.3px; white-space:nowrap; }
.logo span{ color:var(--acc); }
.tabs{ display:flex; gap:4px; margin-left:auto; }
.tab{ background:none; border:1px solid transparent; color:var(--fg2); padding:7px 12px; border-radius:9px; cursor:pointer; font-size:13.5px; font-weight:600; }
.tab.active{ background:var(--bg3); color:var(--fg); border-color:var(--line); }
#menuBtn{ background:none; border:none; font-size:20px; padding:4px 8px; cursor:pointer; color:var(--fg2); }
#menu{ display:none; position:absolute; right:8px; top:100%; background:var(--bg3); border:1px solid var(--line);
  border-radius:12px; padding:6px; flex-direction:column; min-width:190px; box-shadow:0 12px 30px #0009; }
#menu.open{ display:flex; }
#menu button{ background:none; border:none; text-align:left; padding:11px 12px; border-radius:8px; cursor:pointer; font-size:14px; }
#menu button:active{ background:var(--bg2); }

/* ---------- build view ---------- */
main{ position:fixed; inset:0; top:49px; display:flex; flex-direction:column; }
#view-build{ }
#canvasWrap{ flex:1; position:relative; min-height:0; }
#canvas{ width:100%; height:100%; display:block; touch-action:none;
  background:
    radial-gradient(circle at 0 0, transparent 0, transparent 100%),
    repeating-linear-gradient(0deg,transparent 0 19px, #ffffff08 19px 20px),
    repeating-linear-gradient(90deg,transparent 0 19px, #ffffff08 19px 20px),
    var(--bg); }
.part{ cursor:grab; }
.wire .whit{ fill:none; stroke:transparent; stroke-width:16; }
.wire .wvis{ fill:none; stroke-width:4; stroke-linecap:round; filter:drop-shadow(0 2px 1px #0007); }
.rubber{ fill:none; stroke:var(--acc); stroke-width:3; stroke-dasharray:7 5; pointer-events:none; }
.tdot{ stroke:#0d1017; stroke-width:1.5; }
.tdot.tpos{ fill:#ff6b5e; } .tdot.tneg{ fill:#6ea8ff; } .tdot.tsig{ fill:#e8c766; }
.tdot.hot{ animation:pulse 0.8s infinite alternate; }
.tdot.src{ fill:#fff; stroke:var(--acc); stroke-width:3; }
@keyframes pulse{ from{ r:5.5; } to{ r:9; } }
#levelChip{ position:absolute; top:10px; left:10px; display:none; align-items:center; gap:6px;
  background:var(--bg3); border:1px solid var(--line); padding:7px 12px; border-radius:999px; font-size:12.5px; font-weight:600; cursor:pointer; box-shadow:0 4px 14px #0007; }
#btn3d{ position:absolute; top:10px; right:10px; background:var(--bg3); border:1px solid var(--line); color:var(--fg);
  border-radius:12px; padding:9px 13px; font-size:13px; font-weight:800; cursor:pointer; box-shadow:0 4px 14px #0007; }
#btn3d.active{ background:var(--acc); color:#04121f; border-color:var(--acc); }
#gl{ display:none; position:absolute; inset:0; width:100%; height:100%; touch-action:none; }

/* wire editing */
.wjoint{ fill:#4da3ff; stroke:#0d1017; stroke-width:2; cursor:grab; }
.wjoint.wghost{ fill:#4da3ff55; stroke:#4da3ff; stroke-dasharray:3 3; stroke-width:1.5; }
.wjoint.wend{ fill:#fff; stroke:#4da3ff; stroke-width:3; }
.swatch{ width:26px; height:26px; border-radius:99px; border:2px solid transparent; cursor:pointer; }
.swatch.on{ border-color:#fff; }

/* wireless connection glow */
.linkdot{ fill:none; stroke:#3ecf72; stroke-width:2.5; pointer-events:none; opacity:.9; }
.linkdot.inhole{ stroke:#3ecf72aa; stroke-width:2; }

/* solder view */
#solder{ display:none; position:fixed; inset:0; z-index:70; background:#151009; flex-direction:column; }
#solder.open{ display:flex; }
.solderhint{ padding:8px 14px; font-size:12.5px; color:#d8b985; background:#1d1509; border-bottom:1px solid #33260f; line-height:1.45; }
#solderSvg{ flex:1; min-height:0; width:100%; touch-action:none; }
.strace{ cursor:pointer; }
.spad{ cursor:crosshair; }

/* selection panel */
#panel{ display:none; background:var(--bg2); border-top:1px solid var(--line); padding:8px 10px; }
#panel.open{ display:block; }
.prow{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.prow.props{ margin-top:6px; }
.prow b{ font-size:14px; }
.reads{ font-size:12px; color:var(--fg2); font-variant-numeric:tabular-nums; }
.spacer{ flex:1; }
.btn{ background:var(--bg3); border:1px solid var(--line); border-radius:9px; padding:8px 12px; cursor:pointer; font-size:13px; font-weight:600; }
.btn:active{ transform:translateY(1px); }
.btn.accent{ background:#17395e; border-color:#265a8f; }
.btn.danger{ background:#3d1a1f; border-color:#6e2a33; }
.btn.ok{ background:#143d26; border-color:#25693f; }
.btn.active{ background:var(--acc); color:#04121f; }
label{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--fg2); }
label.grow{ flex:1; min-width:150px; }
label.grow input[type=range]{ flex:1; }
select,input[type=range]{ accent-color:var(--acc); background:var(--bg3); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:6px; font-size:13px; }

/* parts tray */
#tray{ display:flex; gap:8px; overflow-x:auto; padding:8px 10px calc(8px + var(--safe-b)); background:var(--bg2);
  border-top:1px solid var(--line); align-items:stretch; scrollbar-width:thin; }
.traycat{ display:flex; align-items:center; color:var(--fg2); font-size:10.5px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; writing-mode:vertical-rl; transform:rotate(180deg); padding:2px 0; flex:none; }
.traybtn{ flex:none; width:86px; background:var(--bg3); border:1px solid var(--line); border-radius:12px; padding:6px 4px 5px;
  display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
.traybtn:active{ border-color:var(--acc); }
.traybtn svg{ width:70px; height:44px; }
.traybtn span{ font-size:10px; color:var(--fg2); line-height:1.15; text-align:center; }

/* ---------- learn ---------- */
#view-learn,#view-guide{ overflow-y:auto; padding:14px 14px calc(20px + var(--safe-b)); -webkit-overflow-scrolling:touch; }
.unit{ font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--fg2); margin:20px 2px 8px; }
.level{ display:flex; align-items:center; gap:10px; width:100%; background:var(--bg2); border:1px solid var(--line);
  border-radius:12px; padding:13px 14px; margin-bottom:8px; cursor:pointer; font-size:14.5px; }
.level.done{ border-color:#1f5c37; }
.level .ltitle{ font-weight:600; }
.level .chev{ margin-left:auto; color:var(--fg2); }
.project{ background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.project p{ margin:6px 0 0; color:var(--fg2); font-size:13.5px; line-height:1.5; }
.diff{ font-size:11px; color:var(--warn); border:1px solid #5c4713; border-radius:99px; padding:2px 8px; margin-left:6px; }
#levelDetail h2{ margin:14px 0 10px; }
.goal{ display:flex; gap:10px; background:#132036; border:1px solid #234; border-radius:12px; padding:12px; font-size:14px; }
.lbody{ font-size:14.5px; line-height:1.6; color:#cfd9ea; }
.lbody pre{ background:#0a0d13; border:1px solid var(--line); border-radius:10px; padding:12px; overflow-x:auto; font-size:12.5px; line-height:1.5; color:#9fd4ff; }
.lbody code{ background:#0a0d13; padding:1px 5px; border-radius:5px; font-size:.92em; color:#9fd4ff; }
.lbtns{ display:flex; gap:8px; margin:12px 0; }
.hint{ background:#332a12; border:1px solid #5c4713; border-radius:10px; padding:11px 13px; font-size:13.5px; }

/* ---------- guide ---------- */
.gcard{ display:flex; gap:12px; background:var(--bg2); border:1px solid var(--line); border-radius:14px; padding:13px; margin-bottom:10px; }
.gpic{ flex:none; width:110px; display:flex; align-items:flex-start; }
.gpic svg{ width:110px; max-height:110px; }
.gtxt h3{ margin:0 0 6px; font-size:15px; }
.infotext{ font-size:13.5px; line-height:1.55; color:#cfd9ea; }
.infotext code{ background:#0a0d13; padding:1px 5px; border-radius:5px; color:#9fd4ff; }
.gadd{ margin-top:8px; }
@media (max-width:520px){ .gcard{ flex-direction:column; } .gpic{ width:100%; justify-content:center; } }

/* ---------- modal ---------- */
#modal{ display:none; position:fixed; inset:0; background:#000a; z-index:90; align-items:flex-end; justify-content:center; }
.xp{ width:100%; border-collapse:collapse; font-size:12.5px; margin:8px 0; }
.xp td{ border-top:1px solid var(--line); padding:7px 8px; vertical-align:top; line-height:1.5; }
.xp td:first-child{ font-family:ui-monospace,Menlo,Consolas,monospace; color:#9fd4ff; white-space:pre-wrap; width:38%; }
.infotext h3{ margin:14px 0 4px; font-size:14px; }
#modal.open{ display:flex; }
.sheet{ background:var(--bg2); border:1px solid var(--line); border-radius:18px 18px 0 0; max-width:640px; width:100%;
  max-height:82vh; overflow-y:auto; padding:16px 18px calc(18px + var(--safe-b)); position:relative; }
.sheet h2{ margin:2px 40px 10px 0; font-size:18px; }
#modalClose{ position:absolute; top:10px; right:10px; background:var(--bg3); border:1px solid var(--line); border-radius:99px;
  width:34px; height:34px; font-size:16px; cursor:pointer; }
.preview{ display:flex; justify-content:center; background:#0a0d13; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; }
.preview svg{ max-width:220px; max-height:130px; }

/* ---------- code editor ---------- */
#editor{ display:none; position:fixed; inset:0; z-index:70; background:var(--bg); flex-direction:column; }
#editor.open{ display:flex; }
.edhead{ display:flex; align-items:center; gap:8px; padding:10px 12px; padding-top:calc(10px + env(safe-area-inset-top,0px)); background:var(--bg2); border-bottom:1px solid var(--line); }
.edhead b{ font-size:14px; }
#edCode{ flex:1.4; min-height:0; background:#0a0d13; color:#d8e6ff; border:none; outline:none; resize:none;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-size:13px; line-height:1.55; padding:12px; white-space:pre; }
.edbar{ display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--bg2); border-top:1px solid var(--line); flex-wrap:wrap; }
.st{ font-size:12.5px; color:var(--fg2); }
.st.run{ color:var(--ok); } .st.err{ color:var(--bad); }
#edSerial{ flex:1; min-height:0; background:#06080c; color:#7ddc8f; font-family:ui-monospace,Menlo,Consolas,monospace;
  font-size:12px; line-height:1.5; padding:10px 12px calc(10px + var(--safe-b)); margin:0; overflow-y:auto; white-space:pre-wrap; border-top:1px solid var(--line); }

/* ---------- toasts ---------- */
#toasts{ position:fixed; left:50%; transform:translateX(-50%); top:calc(56px + env(safe-area-inset-top,0px)); z-index:80;
  display:flex; flex-direction:column; gap:6px; width:min(94vw,480px); pointer-events:none; }
.toast{ background:var(--bg3); border:1px solid var(--line); border-left:4px solid var(--acc); border-radius:10px;
  padding:10px 13px; font-size:13px; line-height:1.45; opacity:0; transform:translateY(-8px); transition:.3s; box-shadow:0 8px 24px #0008; }
.toast.show{ opacity:1; transform:none; }
.toast.warn{ border-left-color:var(--warn); }
.toast.danger{ border-left-color:var(--bad); }
.toast.ok{ border-left-color:var(--ok); }
</style>
</head>
<body>
<svg id="svgdefs" width="0" height="0" style="position:absolute"><defs></defs></svg>

<header>
  <div class="logo">⚡ Circuit<span>Lab</span></div>
  <nav class="tabs">
    <button class="tab active" data-tab="build">Build</button>
    <button class="tab" data-tab="learn">Learn</button>
    <button class="tab" data-tab="guide">Guide</button>
  </nav>
  <button id="menuBtn" aria-label="menu">☰</button>
  <div id="menu">
    <button id="mSound">🔇 Sound: off</button>
    <button id="mDemo">✨ Load demo circuit</button>
    <button id="mClear">🗑 Clear circuit</button>
    <button id="mInstall">📱 Install on phone</button>
  </div>
</header>

<main id="view-build">
  <div id="canvasWrap">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg"><defs id="canvasDefs"></defs><g id="scene"></g></svg>
    <canvas id="gl"></canvas>
    <div id="levelChip"></div>
    <button id="btn3d" title="Full 3D view">3D</button>
  </div>
  <div id="panel"></div>
  <div id="tray"></div>
</main>

<main id="view-learn" style="display:none">
  <div id="learnList"></div>
  <div id="levelDetail" style="display:none"></div>
</main>

<main id="view-guide" style="display:none">
  <div id="guideList"></div>
</main>

<div id="modal"><div class="sheet"><button id="modalClose">✕</button><div id="modalBody"></div></div></div>

<div id="solder">
  <div class="edhead">
    <b>🔁 Copper side — soldering</b>
    <span class="st" id="solderCount"></span>
    <span class="spacer" style="flex:1"></span>
    <button class="btn ok" id="solderClose">✓ Done</button>
  </div>
  <div class="solderhint">Drag from pad to pad to lay a solder trace. Tap a trace to remove it. Silver pins = component legs poking through from the front.</div>
  <svg id="solderSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="editor">
  <div class="edhead">
    <b id="edTitle">Code</b>
    <span class="st" id="edStatus">ready</span>
    <span class="spacer" style="flex:1"></span>
    <button class="btn" id="edClose">✕ Close</button>
  </div>
  <textarea id="edCode" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
  <div class="edbar">
    <button class="btn ok" id="edRun">▶ Upload &amp; Run</button>
    <button class="btn danger" id="edStop">■ Stop</button>
    <select id="edExamples"><option value="">Examples…</option>
      <option>Blink</option><option>Built-in LED</option><option>Button → LED</option><option>Fade (PWM)</option>
      <option>Analog read</option><option>Serial counter</option><option>Alarm</option></select>
    <button class="btn" id="edRef">📖 Reference</button>
    <span class="spacer" style="flex:1"></span>
    <button class="btn" id="edClear">Clear serial</button>
  </div>
  <pre id="edSerial"></pre>
</div>

<div id="toasts"></div>

<script src="parts.js"></script>
<script src="sim.js"></script>
<script src="code.js"></script>
<script src="learn.js"></script>
<script src="vendor/three.min.js"></script>
<script src="view3d.js"></script>
<script src="app.js"></script>
</body>
</html>
